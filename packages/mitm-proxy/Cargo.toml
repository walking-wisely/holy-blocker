[package]
name = "mitm-proxy"
version = "0.1.0"
edition = "2024"

[lib]
name = "mitm_proxy"
path = "src/lib.rs"

[[bin]]
name = "mitm-proxy"
path = "src/main.rs"

[dependencies]
text-policy = { path = "../text-policy" }
anyhow = "1"
bytes = "1"
http-body-util = "0.1"
hyper = { version = "1", features = ["http1", "server", "client"] }
hyper-util = { version = "0.1", features = ["tokio"] }
pem = "3"
rcgen = { version = "0.13", features = ["x509-parser"] }
rustls = { version = "0.23", features = ["ring"] }
rustls-native-certs = "0.8"
tokio = { version = "1", features = ["full"] }
tokio-rustls = "0.26"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
x509-parser = "0.16"

[profile.bench]
inherits = "release"
debug = true        # preserve symbols for samply / WPA
split-debuginfo = "packed"  # emit a separate .pdb on Windows

[[bench]]
name = "tunnel"
harness = false

[[bench]]
name = "tls_cert"
harness = false

[[bench]]
name = "headers"
harness = false
