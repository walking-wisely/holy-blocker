name: CodeQL SAST

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    # Weekly scan on Monday 03:00 UTC — catches newly-disclosed queries
    # on code that hasn't changed since the last push.
    - cron: "0 3 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      security-events: write
      # Required for private repos; harmless on public ones.
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python
          - rust
          - c-cpp

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: ${{ matrix.language }}
          # build-mode: none is GA for Rust and C/C++ (Oct 2025) and is the
          # default for JavaScript/TypeScript and Python — no compiler needed.
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: "/language:${{ matrix.language }}"
